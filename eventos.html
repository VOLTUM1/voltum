<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Próximos Eventos — Voltum</title>
  <meta name="description" content="Descubre los próximos eventos de los DJs en Voltum. Entradas, fechas y venues de toda Chile.">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── HERO ──────────────────────────────────────────────── */
    .events-hero {
      position: relative; overflow: hidden;
      padding: 100px 0 56px;
      background:
        radial-gradient(ellipse 70% 50% at 30% 0%, rgba(34,211,238,0.15) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139,92,246,0.18) 0%, transparent 60%),
        var(--bg);
    }
    .events-hero::before {
      content:''; position:absolute; inset:0; opacity:0.03;
      background-image: linear-gradient(var(--border2) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border2) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .events-hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-radius: 100px;
      background: rgba(34,211,238,0.08); border: 1px solid rgba(34,211,238,0.2);
      font-size: 0.78rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--cyan);
      margin-bottom: 20px;
    }
    .events-hero-title {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900; text-align: center;
      letter-spacing: -1.5px; line-height: 1.1;
      margin-bottom: 12px;
    }
    .events-hero-sub {
      text-align: center; color: var(--muted); font-size: 1rem;
      margin-bottom: 36px; max-width: 460px; margin-inline: auto;
    }

    /* ── FILTROS ───────────────────────────────────────────── */
    .events-filters {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; flex-wrap: wrap; max-width: 700px; margin: 0 auto;
    }
    .ev-search-wrap {
      position: relative; flex: 1; min-width: 200px; max-width: 320px;
    }
    .ev-search-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: var(--muted2);
    }
    .ev-search-input {
      width: 100%; padding: 11px 16px 11px 40px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border2);
      border-radius: 100px; color: var(--text);
      font-family: inherit; font-size: 0.9rem; outline: none;
      transition: var(--transition);
    }
    .ev-search-input:focus {
      border-color: var(--cyan);
      background: rgba(34,211,238,0.05);
      box-shadow: 0 0 0 3px rgba(34,211,238,0.1);
    }
    .ev-search-input::placeholder { color: var(--muted2); }
    .ev-filter-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-radius: 100px;
      border: 1px solid var(--border2); background: rgba(255,255,255,0.03);
      color: var(--muted); font-size: 0.85rem; cursor: pointer;
      transition: var(--transition); font-family: inherit; white-space: nowrap;
    }
    .ev-filter-pill select {
      background: none; border: none; color: var(--muted);
      font-family: inherit; font-size: 0.85rem; cursor: pointer; outline: none;
    }
    .ev-filter-pill select option { background: #12121e; color: var(--text); }

    /* ── SECCIÓN EVENTOS ───────────────────────────────────── */
    .events-section { max-width: 1100px; margin: 0 auto; padding: 48px 20px 80px; }

    .events-count {
      font-size: 0.875rem; color: var(--muted); margin-bottom: 24px;
    }
    .events-count strong { color: var(--text); }

    /* Grid de eventos */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ── EVENT CARD ─────────────────────────────────────────── */
    .ev-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
      animation: cardIn 0.4s ease both;
      display: flex; flex-direction: column;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .ev-card:hover {
      transform: translateY(-5px);
      border-color: rgba(34,211,238,0.3);
      box-shadow: 0 16px 40px rgba(34,211,238,0.08), 0 4px 12px rgba(0,0,0,0.3);
    }

    /* Flyer */
    .ev-flyer {
      width: 100%; height: 180px;
      object-fit: cover; display: block;
    }
    .ev-flyer-placeholder {
      width: 100%; height: 180px;
      background: linear-gradient(135deg, #0d0d20 0%, #0a1525 50%, #0d0820 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .ev-flyer-placeholder::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 50%, rgba(34,211,238,0.12), transparent 60%),
                  radial-gradient(circle at 70% 50%, rgba(139,92,246,0.12), transparent 60%);
    }
    .ev-flyer-placeholder-icon {
      font-size: 2.5rem; position: relative; z-index: 1; opacity: 0.5;
    }

    /* Fecha badge en la imagen */
    .ev-date-badge {
      position: absolute; top: 12px; left: 12px;
      background: rgba(5,5,8,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 6px 12px;
      text-align: center;
      min-width: 52px;
    }
    .ev-date-badge .ev-day {
      font-size: 1.3rem; font-weight: 800; line-height: 1;
      color: var(--text);
    }
    .ev-date-badge .ev-month {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--cyan); margin-top: 2px;
    }
    .ev-flyer-wrap {
      position: relative; flex-shrink: 0;
    }

    /* Body */
    .ev-body {
      padding: 18px 18px 16px;
      display: flex; flex-direction: column; gap: 10px;
      flex: 1;
    }
    .ev-name {
      font-size: 1.05rem; font-weight: 700; color: var(--text);
      line-height: 1.3;
    }
    .ev-location {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.82rem; color: var(--muted);
    }
    .ev-location svg { flex-shrink: 0; color: var(--muted2); }

    /* DJ info */
    .ev-dj-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      text-decoration: none;
      transition: var(--transition);
      margin-top: auto;
    }
    .ev-dj-row:hover {
      border-color: var(--border);
      background: rgba(139,92,246,0.07);
    }
    .ev-dj-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 800; color: #fff;
      flex-shrink: 0; overflow: hidden;
    }
    .ev-dj-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .ev-dj-name {
      font-size: 0.85rem; font-weight: 600; color: var(--text); flex: 1;
    }
    .ev-dj-arrow {
      font-size: 0.75rem; color: var(--muted2); transition: var(--transition);
    }
    .ev-dj-row:hover .ev-dj-arrow { color: var(--purple-l); transform: translateX(3px); }

    /* Ticket button */
    .ev-ticket-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px 16px; border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(34,211,238,0.08));
      border: 1px solid rgba(139,92,246,0.3);
      color: var(--purple-l); font-size: 0.85rem; font-weight: 600;
      text-decoration: none; transition: var(--transition);
      text-align: center;
    }
    .ev-ticket-btn:hover {
      background: linear-gradient(135deg, rgba(139,92,246,0.25), rgba(34,211,238,0.12));
      border-color: var(--purple); color: var(--purple-l);
      transform: translateY(-1px);
    }

    /* ── EMPTY / LOADING STATES ─────────────────────────────── */
    .ev-empty {
      grid-column: 1/-1;
      text-align: center; padding: 80px 20px;
      color: var(--muted2);
    }
    .ev-empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .ev-empty h3 { font-size: 1.1rem; color: var(--muted); margin-bottom: 8px; }
    .ev-empty p  { font-size: 0.875rem; }

    .ev-skel {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: var(--radius-xl); overflow: hidden;
      animation: shimmer 1.5s infinite;
    }
    .ev-skel-img  { height: 180px; background: rgba(255,255,255,0.04); }
    .ev-skel-body { padding: 18px; display: flex; flex-direction: column; gap: 10px; }
    .ev-skel-line { height: 12px; border-radius: 6px; background: rgba(255,255,255,0.05); }
    @keyframes shimmer {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.6; }
    }

    /* ── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .events-hero { padding: 80px 0 40px; }
      .events-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .events-section { padding: 32px 12px 60px; }
      .ev-body { padding: 14px 14px 12px; }
      .ev-name { font-size: 0.95rem; }
      .events-filters { gap: 8px; }
    }
    @media (max-width: 480px) {
      .events-grid { grid-template-columns: 1fr; }
      .ev-flyer, .ev-flyer-placeholder { height: 160px; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <div class="container">
    <a href="index.html" class="logo">VOLTUM</a>
    <div class="nav-links">
      <a href="buscar.html" class="btn btn-ghost btn-sm">🔍 Buscar DJs</a>
      <a href="eventos.html" class="btn btn-ghost btn-sm" style="color:var(--cyan);">🗓️ Eventos</a>
      <a href="index.html#pricing" class="btn btn-ghost btn-sm">Precios</a>
      <a href="presskit.html?demo=true" class="btn btn-outline btn-sm">Ver Demo</a>
      <a href="auth.html" class="btn btn-ghost btn-sm" id="navLoginBtn">Iniciar sesión</a>
      <a href="auth.html" class="btn btn-primary btn-sm" id="navRegisterBtn">Comenzar gratis</a>
      <a href="dashboard.html" class="btn btn-outline btn-sm hidden" id="navDashBtn">Mi Dashboard</a>
    </div>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="nav-mobile-menu" id="navMobileMenu">
  <a href="buscar.html">🔍 Buscar DJs</a>
  <a href="eventos.html" style="color:var(--cyan);">🗓️ Eventos</a>
  <a href="index.html#pricing">Precios</a>
  <a href="presskit.html?demo=true" class="btn btn-outline">Ver Demo</a>
  <a href="auth.html" class="btn btn-primary" id="navRegisterBtnM">⚡ Comenzar gratis</a>
</div>

<!-- HERO -->
<section class="events-hero">
  <div class="container-sm" style="position:relative;z-index:1;text-align:center;">
    <div class="events-hero-eyebrow">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda de eventos
    </div>
    <h1 class="events-hero-title">
      Próximos <span class="gradient-text">Eventos</span>
    </h1>
    <p class="events-hero-sub">
      Las próximas fechas de los DJs en Voltum. Consigue tus entradas antes de que se agoten.
    </p>

    <!-- FILTROS -->
    <div class="events-filters">
      <div class="ev-search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="ev-search-input" id="evSearch" placeholder="Evento, DJ, venue..." autocomplete="off">
      </div>
      <div class="ev-filter-pill">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <select id="evCityFilter">
          <option value="">Todas las ciudades</option>
        </select>
      </div>
      <div class="ev-filter-pill" id="evGenrePill" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <select id="evGenreFilter">
          <option value="">Todos los géneros</option>
        </select>
      </div>
    </div>
  </div>
</section>

<!-- EVENTOS -->
<section class="events-section">
  <div class="events-count" id="evCount">Cargando eventos...</div>
  <div class="events-grid" id="evGrid">
    <!-- Skeletons -->
    <div class="ev-skel"><div class="ev-skel-img"></div><div class="ev-skel-body"><div class="ev-skel-line" style="width:70%"></div><div class="ev-skel-line" style="width:50%"></div><div class="ev-skel-line" style="width:40%"></div></div></div>
    <div class="ev-skel"><div class="ev-skel-img"></div><div class="ev-skel-body"><div class="ev-skel-line" style="width:65%"></div><div class="ev-skel-line" style="width:45%"></div><div class="ev-skel-line" style="width:55%"></div></div></div>
    <div class="ev-skel"><div class="ev-skel-img"></div><div class="ev-skel-body"><div class="ev-skel-line" style="width:75%"></div><div class="ev-skel-line" style="width:40%"></div><div class="ev-skel-line" style="width:60%"></div></div></div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
const MONTHS_ES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];

let allEvents = [];
let searchQ = '';
let cityFilter = '';
let genreFilter = '';

// ── Cargar eventos ──────────────────────────────────────────────
(async () => {
  const today = new Date().toISOString().split('T')[0];

  // 1. Obtener user_ids con membresía activa y no vencida
  const { data: mems } = await sb
    .from('memberships')
    .select('user_id')
    .eq('status', 'active')
    .gte('expires_at', today);

  const activeUserIds = (mems || []).map(m => m.user_id);

  if (!activeUserIds.length) {
    renderEmpty('No hay eventos próximos por ahora. ¡Vuelve pronto!');
    return;
  }

  // 2. Obtener próximos eventos de DJs con membresía activa
  const { data: events, error } = await sb
    .from('events')
    .select('id, name, venue, city, date, genre, ticket_url, flyer_url, user_id, profiles(dj_name, slug, photo_url)')
    .in('user_id', activeUserIds)
    .gte('date', today)
    .order('date', { ascending: true });

  if (error) { renderEmpty('Error cargando eventos. Intenta de nuevo.'); return; }

  allEvents = (events || []).filter(e => e.profiles?.slug);

  // Poblar filtro de ciudades
  const cities = [...new Set(allEvents.map(e => e.city).filter(Boolean))].sort();
  const sel = document.getElementById('evCityFilter');
  cities.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });

  // Poblar filtro de géneros
  const genres = [...new Set(allEvents.map(e => e.genre).filter(Boolean))].sort();
  const genreSel = document.getElementById('evGenreFilter');
  genres.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    genreSel.appendChild(opt);
  });
  if (genres.length) document.getElementById('evGenrePill').style.display = 'flex';

  renderEvents();
})();

// ── Filtros ─────────────────────────────────────────────────────
document.getElementById('evSearch').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase().trim();
  renderEvents();
});
document.getElementById('evCityFilter').addEventListener('change', e => {
  cityFilter = e.target.value;
  renderEvents();
});
document.getElementById('evGenreFilter').addEventListener('change', e => {
  genreFilter = e.target.value;
  renderEvents();
});

// ── Render ───────────────────────────────────────────────────────
function renderEvents() {
  const filtered = allEvents.filter(ev => {
    const q = searchQ;
    if (q && !ev.name?.toLowerCase().includes(q) &&
             !ev.profiles?.dj_name?.toLowerCase().includes(q) &&
             !ev.venue?.toLowerCase().includes(q) &&
             !ev.city?.toLowerCase().includes(q)) return false;
    if (cityFilter && ev.city !== cityFilter) return false;
    if (genreFilter && ev.genre !== genreFilter) return false;
    return true;
  });

  const countEl = document.getElementById('evCount');
  countEl.innerHTML = filtered.length
    ? `<strong>${filtered.length}</strong> evento${filtered.length !== 1 ? 's' : ''} próximo${filtered.length !== 1 ? 's' : ''}`
    : '';

  const grid = document.getElementById('evGrid');

  if (!filtered.length) {
    grid.innerHTML = `
      <div class="ev-empty">
        <div class="ev-empty-icon">🗓️</div>
        <h3>Sin resultados</h3>
        <p>No hay eventos que coincidan con tu búsqueda.</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map((ev, i) => buildCard(ev, i)).join('');
}

function buildCard(ev, index) {
  const d = new Date(ev.date + 'T12:00:00');
  const day = d.getDate();
  const month = MONTHS_ES[d.getMonth()];
  const year = d.getFullYear();
  const currentYear = new Date().getFullYear();

  const dateLabel = currentYear !== year
    ? `${day} ${month} ${year}`
    : `${day} ${month}`;

  const location = [ev.venue, ev.city].filter(Boolean).join(' · ');
  const dj = ev.profiles;
  const avatarLetter = (dj?.dj_name || '?')[0].toUpperCase();
  const pressKitUrl = dj?.slug ? `presskit.html?slug=${dj.slug}` : '#';

  const flyerHtml = ev.flyer_url
    ? `<img class="ev-flyer" src="${ev.flyer_url}" alt="Flyer ${ev.name}" loading="lazy">`
    : `<div class="ev-flyer-placeholder"><div class="ev-flyer-placeholder-icon">🎧</div></div>`;

  const avatarHtml = dj?.photo_url
    ? `<div class="ev-dj-avatar"><img src="${dj.photo_url}" alt="${dj.dj_name}" loading="lazy"></div>`
    : `<div class="ev-dj-avatar">${avatarLetter}</div>`;

  const ticketHtml = ev.ticket_url
    ? `<a href="${ev.ticket_url}" target="_blank" rel="noopener" class="ev-ticket-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        Comprar entradas
       </a>`
    : '';

  return `
    <div class="ev-card" style="animation-delay:${Math.min(index * 0.05, 0.4)}s">
      <div class="ev-flyer-wrap">
        ${flyerHtml}
        <div class="ev-date-badge">
          <div class="ev-day">${day}</div>
          <div class="ev-month">${month}</div>
        </div>
      </div>
      <div class="ev-body">
        <div class="ev-name">${escHtml(ev.name)}</div>
        ${ev.genre ? `<div style="margin-bottom:6px;"><span style="display:inline-block;font-size:0.7rem;font-weight:700;padding:2px 10px;border-radius:100px;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.3);color:#a78bfa;letter-spacing:0.03em;">${escHtml(ev.genre)}</span></div>` : ''}
        ${location ? `
        <div class="ev-location">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${escHtml(location)}
        </div>` : ''}
        ${ticketHtml}
        <a href="${pressKitUrl}" class="ev-dj-row" target="_blank">
          ${avatarHtml}
          <span class="ev-dj-name">${escHtml(dj?.dj_name || 'DJ')}</span>
          <span class="ev-dj-arrow">Ver press kit →</span>
        </a>
      </div>
    </div>`;
}

function renderEmpty(msg) {
  document.getElementById('evCount').textContent = '';
  document.getElementById('evGrid').innerHTML = `
    <div class="ev-empty">
      <div class="ev-empty-icon">🗓️</div>
      <h3>${msg}</h3>
      <p>Los DJs publican sus fechas desde su press kit.</p>
    </div>`;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Navbar hamburger ────────────────────────────────────────────
document.getElementById('navHamburger')?.addEventListener('click', () => {
  const menu = document.getElementById('navMobileMenu');
  const btn  = document.getElementById('navHamburger');
  menu.classList.toggle('open');
  btn.classList.toggle('open');
});

// ── Navbar auth state ───────────────────────────────────────────
(async () => {
  const { data: { user } } = await sb.auth.getUser();
  if (user) {
    document.getElementById('navLoginBtn')?.classList.add('hidden');
    document.getElementById('navRegisterBtn')?.classList.add('hidden');
    document.getElementById('navRegisterBtnM')?.classList.add('hidden');
    document.getElementById('navDashBtn')?.classList.remove('hidden');
  }
})();
</script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
